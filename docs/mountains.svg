<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="mtGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
    <linearGradient id="mtGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7BC8"/>
      <stop offset="100%" stop-color="#1E4D72"/>
    </linearGradient>
  </defs>
  <!-- Back mountain -->
  <polygon points="50,280 200,60 350,280" fill="url(#mtGrad2)"/>
  <!-- Snow cap back -->
  <polygon points="200,60 170,130 230,130" fill="#E8F4FD" opacity="0.9"/>
  <!-- Front mountain -->
  <polygon points="0,280 150,100 300,280" fill="url(#mtGrad1)"/>
  <!-- Snow cap front -->
  <polygon points="150,100 125,160 175,160" fill="#FFFFFF" opacity="0.95"/>
  <!-- Foothill -->
  <polygon points="200,280 300,180 400,280" fill="#2C5F8A" opacity="0.7"/>
</svg>
